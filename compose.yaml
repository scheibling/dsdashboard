services:
  dashboard:
    build: .
    container_name: dashboard
    init: true
    ports:
      - "8080:3000"
    environment:
      TZ: Europe/Stockholm
      NODE_ENV: production
      DASHBOARD_ADMIN_PASSWORD: ${DASHBOARD_ADMIN_PASSWORD:-change-me-now}
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      STATUS_INTERVAL: ${STATUS_INTERVAL:-60}
      STATUS_TIMEOUT: ${STATUS_TIMEOUT:-5}
    volumes:
      - ./site:/site
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/status"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
